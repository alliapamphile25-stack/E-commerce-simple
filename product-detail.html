<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Produit — LUXE & CO</title>
  <meta name="description" id="page-desc" content="Détail produit LUXE&CO">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar__inner">
    <a href="index.html" class="navbar__logo">LUXE<span>&</span>CO</a>
    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="products.html">Catalogue</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="navbar__actions">
      <button class="cart-icon-btn" aria-label="Ouvrir le panier">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span class="cart-badge">0</span>
      </button>
      <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>
<div class="nav-overlay"></div>

<aside class="mini-cart">
  <div class="mini-cart__header">
    <h3>Mon Panier</h3>
    <button class="mini-cart__close">✕</button>
  </div>
  <div class="mini-cart__items"><p class="mini-cart__empty">Votre panier est vide.</p></div>
  <div class="mini-cart__footer" style="display:none">
    <div class="mini-cart__total">
      <span>Total</span><span class="mini-cart__total-val">0,00 €</span>
    </div>
    <a href="cart.html" class="btn btn--dark btn--full" style="margin-bottom:.7rem">Voir le panier</a>
    <a href="checkout.html" class="btn btn--primary btn--full">Commander →</a>
  </div>
</aside>

<!-- ── Page produit ── -->
<main class="product-page" id="product-page">

  <!-- Fil d'Ariane -->
  <nav class="breadcrumb" aria-label="Fil d'Ariane">
    <a href="index.html">Accueil</a>
    <span>›</span>
    <a href="products.html">Catalogue</a>
    <span>›</span>
    <span id="breadcrumb-name">Produit</span>
  </nav>

  <!-- Contenu produit -->
  <div class="product-detail" id="product-detail">
    <!-- Rempli par JS -->
  </div>

  <!-- Produits similaires -->
  <section class="section" style="border-top:1px solid var(--gray-200)">
    <div class="container">
      <div class="section__header">
        <span class="section-label">Vous aimerez aussi</span>
        <h2 class="section-title">Produits similaires</h2>
      </div>
      <div class="products-grid" id="related-products"></div>
    </div>
  </section>
</main>

<footer class="footer" style="padding:2.5rem 1.5rem">
  <div style="max-width:1240px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;font-size:.85rem">
    <a href="index.html" class="footer__logo" style="font-size:1.2rem;margin-bottom:0">LUXE<span>&</span>CO</a>
    <span style="color:rgba(255,255,255,.4)">© 2025 LUXE&CO. Tous droits réservés.</span>
  </div>
</footer>

<button class="back-to-top" aria-label="Retour en haut">↑</button>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/main.js"></script>
<script>
function renderProductCard(p) {
  const stars = "★".repeat(Math.floor(p.rating));
  return `
    <article class="product-card slide-up" data-id="${p.id}">
      <a href="product-detail.html?id=${p.id}" class="product-card__thumb">
        <img src="${p.image}" alt="${p.name}" loading="lazy">
        ${p.badge ? `<span class="product-card__badge">${p.badge}</span>` : ""}
      </a>
      <div class="product-card__body">
        <span class="product-card__category">${p.category}</span>
        <h3 class="product-card__name"><a href="product-detail.html?id=${p.id}">${p.name}</a></h3>
        <div class="product-card__rating">
          <span class="stars">${stars}</span>
          <span>${p.rating}</span>
        </div>
        <div class="product-card__footer">
          <div class="product-card__price">
            <span class="price-current">${p.price.toFixed(2)} €</span>
            ${p.oldPrice ? `<span class="price-old">${p.oldPrice.toFixed(2)} €</span>` : ""}
          </div>
          <button class="product-card__add" data-id="${p.id}" aria-label="Ajouter au panier">+</button>
        </div>
      </div>
    </article>`;
}

document.addEventListener("DOMContentLoaded", () => {
  const id = parseInt(new URLSearchParams(location.search).get("id"));
  const product = getProductById(id);

  if (!product) {
    document.getElementById("product-detail").innerHTML = `
      <div class="empty-state" style="grid-column:1/-1;padding:5rem 0">
        <div class="empty-state__icon">😕</div>
        <h2>Produit introuvable</h2>
        <p>Ce produit n'existe pas ou a été retiré.</p>
        <a href="products.html" class="btn btn--dark">Retour au catalogue</a>
      </div>`;
    return;
  }

  // SEO dynamique
  document.getElementById("page-title").textContent = `${product.name} — LUXE & CO`;
  document.getElementById("page-desc").setAttribute("content", product.description);
  document.getElementById("breadcrumb-name").textContent = product.name;

  // Rendu galerie + infos
  const stars = "★".repeat(Math.floor(product.rating));
  document.getElementById("product-detail").innerHTML = `
    <!-- Galerie -->
    <div class="product-gallery slide-left">
      <div class="gallery-main">
        <img src="${product.images[0]}" alt="${product.name}" id="gallery-main-img">
      </div>
      <div class="gallery-thumbs">
        ${product.images.map((img, i) => `
          <div class="gallery-thumb${i===0?" is-active":""}" data-img="${img}" data-idx="${i}">
            <img src="${img}" alt="${product.name} vue ${i+1}" loading="lazy">
          </div>`).join("")}
      </div>
    </div>

    <!-- Infos produit -->
    <div class="product-info slide-right">
      <p class="product-info__category">${product.category}</p>
      <h1 class="product-info__title">${product.name}</h1>

      <div class="product-info__rating">
        <span class="stars">${stars}</span>
        <span>${product.rating} — ${product.reviews} avis vérifiés</span>
      </div>

      <div class="product-info__price">
        <span class="product-info__price-current">${product.price.toFixed(2)} €</span>
        ${product.oldPrice ? `<span class="product-info__price-old">${product.oldPrice.toFixed(2)} €</span>` : ""}
      </div>

      <p class="product-info__desc">${product.description}</p>

      <div class="product-info__features">
        <h4>Caractéristiques</h4>
        <ul class="feature-list">
          ${product.features.map(f => `<li>${f}</li>`).join("")}
        </ul>
      </div>

      <div class="product-info__qty">
        <label>Quantité</label>
        <div class="qty-input">
          <button class="qty-btn" id="qty-minus" aria-label="Diminuer">−</button>
          <input type="number" class="qty-num" id="qty-value" value="1" min="1" max="${product.stock}" readonly>
          <button class="qty-btn" id="qty-plus" aria-label="Augmenter">+</button>
        </div>
      </div>

      <div class="product-info__actions">
        <button class="btn btn--primary btn--lg" id="add-to-cart-btn" style="flex:1">
          Ajouter au panier
        </button>
        <a href="checkout.html" class="btn btn--dark btn--lg">
          Acheter maintenant
        </a>
      </div>

      <p class="product-info__stock">✓ En stock (${product.stock} disponibles)</p>

      <!-- Garanties -->
      <div style="display:flex;gap:1.5rem;flex-wrap:wrap;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--gray-200)">
        <div style="font-size:.8rem;color:var(--gray-600);display:flex;align-items:center;gap:.4rem">
          🚚 Livraison offerte dès 100€
        </div>
        <div style="font-size:.8rem;color:var(--gray-600);display:flex;align-items:center;gap:.4rem">
          ↩️ Retours gratuits 30 jours
        </div>
        <div style="font-size:.8rem;color:var(--gray-600);display:flex;align-items:center;gap:.4rem">
          🔒 Paiement sécurisé
        </div>
      </div>
    </div>`;

  // Changement de photo (galerie)
  let qty = 1;
  document.querySelectorAll(".gallery-thumb").forEach(thumb => {
    thumb.addEventListener("click", () => {
      document.getElementById("gallery-main-img").src = thumb.dataset.img;
      document.querySelectorAll(".gallery-thumb").forEach(t => t.classList.remove("is-active"));
      thumb.classList.add("is-active");
    });
  });

  // Quantité
  document.getElementById("qty-minus").addEventListener("click", () => {
    if (qty > 1) { qty--; document.getElementById("qty-value").value = qty; }
  });
  document.getElementById("qty-plus").addEventListener("click", () => {
    if (qty < product.stock) { qty++; document.getElementById("qty-value").value = qty; }
  });

  // Ajout au panier
  const addBtn = document.getElementById("add-to-cart-btn");
  addBtn.addEventListener("click", () => {
    Cart.add(product.id, qty);
    addBtn.textContent = "✓ Ajouté !";
    addBtn.style.background = "var(--gold-dark)";
    setTimeout(() => {
      addBtn.textContent = "Ajouter au panier";
      addBtn.style.background = "";
    }, 1800);
  });

  // Produits similaires (même catégorie, max 4)
  const related = PRODUCTS
    .filter(p => p.category === product.category && p.id !== product.id)
    .slice(0, 4);

  const relatedGrid = document.getElementById("related-products");
  relatedGrid.innerHTML = related.length
    ? related.map(renderProductCard).join("")
    : "<p style='color:var(--gray-400)'>Aucun produit similaire.</p>";

  relatedGrid.querySelectorAll(".product-card__add").forEach(btn => {
    btn.addEventListener("click", e => {
      e.preventDefault();
      Cart.add(parseInt(btn.dataset.id));
      btn.textContent = "✓";
      setTimeout(() => btn.textContent = "+", 1200);
    });
  });

});
</script>
</body>
</html>
