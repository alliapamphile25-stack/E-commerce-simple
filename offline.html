<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors ligne — LUXE & CO</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d0d0d">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: #0d0d0d;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: .05em;
      margin-bottom: 3rem;
    }
    .logo span { color: #c9a96e; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; opacity: .6; }
    h1 {
      font-size: 1.6rem;
      margin-bottom: .8rem;
      font-weight: 700;
    }
    p {
      color: rgba(255,255,255,.55);
      font-size: .95rem;
      line-height: 1.7;
      max-width: 320px;
      font-family: 'system-ui', sans-serif;
    }
    .btn {
      display: inline-block;
      margin-top: 2.5rem;
      padding: .85rem 2.2rem;
      background: #c9a96e;
      color: #0d0d0d;
      border-radius: 4px;
      font-size: .88rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
    .divider {
      width: 40px; height: 1px;
      background: #c9a96e;
      margin: 2rem auto;
    }
  </style>
</head>
<body>
  <div class="logo">LUXE<span>&</span>CO</div>
  <div class="icon">📡</div>
  <h1>Vous êtes hors ligne</h1>
  <div class="divider"></div>
  <p>Vérifiez votre connexion internet et réessayez. Les pages déjà visitées restent accessibles en mode hors ligne.</p>
  <button class="btn" onclick="location.reload()">Réessayer</button>
</body>
</html>
